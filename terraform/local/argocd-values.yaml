# ArgoCD values for data-lake-platform local dev
# Mirrors iac-local/terraform/argocd-values.yaml

global:
  logging:
    level: warn

configs:
  params:
    server.insecure: "true"
    server.enable.gzip: "true"
    applicationsetcontroller.policy: sync
  cm:
    timeout.reconciliation: 5s
    admin.enabled: "true"
    kustomize.buildOptions: "--enable-helm --enable-alpha-plugins --enable-exec"
    resource.customizations.ignoreDifferences.apps_Deployment: |
      jqPathExpressions:
        - .status
    resource.customizations.ignoreDifferences.apps_StatefulSet: |
      jqPathExpressions:
        - .status
  rbac:
    policy.default: role:admin
  repositories:
    data-lake-platform:
      url: file:///mnt/data-lake-platform
      type: git
      name: data-lake-platform

server:
  service:
    type: NodePort
    nodePortHttp: 30080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

controller:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  volumes:
    - name: sops-age-key
      secret:
        secretName: sops-age-key
    - name: custom-tools
      emptyDir: {}
    - name: data-lake-platform
      hostPath:
        path: /mnt/data-lake-platform
        type: Directory
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.2
      command: ["/bin/sh", "-c"]
      args:
        - echo "Installing KSOPS...";
          mv /usr/local/bin/ksops /custom-tools/ksops;
          mv /usr/local/bin/kustomize /custom-tools/kustomize;
          echo "KSOPS installed successfully"
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumeMounts:
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
    - mountPath: /home/argocd/.config/sops/age
      name: sops-age-key
    - mountPath: /mnt/data-lake-platform
      name: data-lake-platform
  env:
    - name: SOPS_AGE_KEY_FILE
      value: /home/argocd/.config/sops/age/keys.txt
    - name: XDG_CONFIG_HOME
      value: /home/argocd/.config
    - name: GIT_CONFIG_COUNT
      value: "1"
    - name: GIT_CONFIG_KEY_0
      value: safe.directory
    - name: GIT_CONFIG_VALUE_0
      value: /mnt/data-lake-platform
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

applicationSet:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
