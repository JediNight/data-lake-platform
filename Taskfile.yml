version: '3'

vars:
  TF_AWS_DIR: terraform/aws
  CLUSTER_NAME: data-lake
  AWS_PROFILE_NAME: data-lake
  SSO_START_URL: https://mayadangelou.awsapps.com/start
  SSO_REGION: us-east-1
  AWS_ACCOUNT_ID: "445985103066"

tasks:
  # =========================================================================
  # Reviewer Onboarding
  # =========================================================================

  reviewer:check:
    desc: Check that required tools are installed
    silent: true
    cmds:
      - |
        ok=true
        for tool in aws terraform task; do
          if command -v "$tool" > /dev/null 2>&1; then
            printf "  ✓ %-12s %s\n" "$tool" "$(command -v $tool)"
          else
            printf "  ✗ %-12s MISSING\n" "$tool"
            ok=false
          fi
        done
        if [ "$ok" = false ]; then
          echo ""
          echo "Install missing tools:"
          echo "  AWS CLI:   https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
          echo "  Terraform: https://developer.hashicorp.com/terraform/install"
          echo "  Task:      https://taskfile.dev/installation"
          exit 1
        fi
        echo ""
        echo "All tools installed."

  reviewer:sso:
    desc: Configure AWS SSO profile for reviewer access
    deps: [reviewer:check]
    cmds:
      - |
        echo "================================================"
        echo "  Data Lake Platform — SSO Setup"
        echo "================================================"
        echo ""
        echo "This will create an AWS CLI profile named '{{.AWS_PROFILE_NAME}}'"
        echo "using the SSO credentials provided in the submission."
        echo ""
        echo "SSO Portal: {{.SSO_START_URL}}"
        echo "Region:     {{.SSO_REGION}}"
        echo "Account:    {{.AWS_ACCOUNT_ID}}"
        echo ""

        # Write the SSO config directly (no interactive prompts)
        mkdir -p ~/.aws
        if grep -q '\[profile {{.AWS_PROFILE_NAME}}\]' ~/.aws/config 2>/dev/null; then
          echo "Profile '{{.AWS_PROFILE_NAME}}' already exists in ~/.aws/config."
          echo "To reconfigure, remove the existing profile and re-run."
        else
          cat >> ~/.aws/config << 'SSOCONFIG'

        [profile {{.AWS_PROFILE_NAME}}]
        sso_start_url = {{.SSO_START_URL}}
        sso_region = {{.SSO_REGION}}
        sso_account_id = {{.AWS_ACCOUNT_ID}}
        sso_role_name = Reviewer
        region = {{.SSO_REGION}}
        output = json
        SSOCONFIG
          echo "Created AWS profile '{{.AWS_PROFILE_NAME}}' in ~/.aws/config"
        fi

        echo ""
        echo "Next: Log in with the credentials from the submission notes:"
        echo ""
        echo "  aws sso login --profile {{.AWS_PROFILE_NAME}}"
        echo ""
        echo "Then verify access:"
        echo ""
        echo "  task reviewer:verify"

  reviewer:login:
    desc: Log in to AWS via SSO (opens browser)
    cmds:
      - aws sso login --profile {{.AWS_PROFILE_NAME}}

  reviewer:verify:
    desc: Verify AWS access and show platform status
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Data Lake Platform — Status Check"
        echo "================================================"
        echo ""

        echo "--- Identity ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws sts get-caller-identity --output table
        echo ""

        echo "--- Glue Databases (6 expected) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-databases \
          --query 'DatabaseList[].Name' --output table
        echo ""

        echo "--- MSK Connect Connectors (3 expected: RUNNING) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafkaconnect list-connectors \
          --query 'connectors[].{Name:connectorName,State:connectorState}' --output table
        echo ""

        echo "--- Glue ETL Jobs (4 expected) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-jobs \
          --query 'Jobs[].{Name:Name,Workers:NumberOfWorkers}' --output table
        echo ""

        echo "--- Latest Glue Workflow Run ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-workflow-runs \
          --name datalake-medallion-prod --max-results 1 \
          --query 'Runs[0].{Status:Status,Started:StartedOn,Completed:CompletedOn}' --output table
        echo ""

        echo "--- Lambda Trading Simulator ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws lambda get-function \
          --function-name datalake-trading-simulator-prod \
          --query 'Configuration.{Name:FunctionName,Runtime:Runtime,Memory:MemorySize}' --output table
        echo ""

        echo "All checks complete. Run 'task athena:demo' to query data."

  reviewer:sample-queries:
    desc: Run sample Athena queries across all medallion layers
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Row Counts Across All Layers"
        echo "================================================"
        echo ""

        for tbl in "raw_mnpi_prod.orders" "raw_mnpi_prod.trades" "raw_mnpi_prod.positions" \
                    "raw_nonmnpi_prod.market_data" \
                    "curated_mnpi_prod.order_events" "curated_nonmnpi_prod.market_ticks" \
                    "analytics_mnpi_prod.order_summary" "analytics_nonmnpi_prod.market_summary"; do
          QID=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena start-query-execution \
            --query-string "SELECT '$tbl' AS tbl, count(*) AS rows FROM $tbl" \
            --work-group data-engineers-prod \
            --query 'QueryExecutionId' --output text)
          while true; do
            STATE=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
              --query-execution-id "$QID" \
              --query 'QueryExecution.Status.State' --output text)
            if [ "$STATE" = "SUCCEEDED" ]; then
              AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-results \
                --query-execution-id "$QID" \
                --query 'ResultSet.Rows[1].Data[*].VarCharValue' --output text
              break
            elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
              echo "$tbl: QUERY FAILED"
              break
            fi
            sleep 1
          done
        done

  reviewer:access-control-demo:
    desc: Demonstrate Lake Formation access control (MNPI denied for DataAnalyst)
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Access Control Demo"
        echo "================================================"
        echo ""
        echo "To test access control, log into the SSO portal with different roles:"
        echo "  {{.SSO_START_URL}}"
        echo ""
        echo "As FinanceAnalyst (finance-analysts-prod workgroup):"
        echo "  SELECT count(*) FROM curated_mnpi_prod.order_events;  -- SUCCEEDS"
        echo "  SELECT count(*) FROM raw_mnpi_prod.orders;            -- DENIED (raw layer)"
        echo ""
        echo "As DataAnalyst (data-analysts-prod workgroup):"
        echo "  SELECT count(*) FROM curated_nonmnpi_prod.market_ticks;  -- SUCCEEDS"
        echo "  SELECT count(*) FROM curated_mnpi_prod.order_events;     -- DENIED (MNPI)"
        echo ""
        echo "As DataEngineer (data-engineers-prod workgroup):"
        echo "  SELECT count(*) FROM raw_mnpi_prod.orders;  -- SUCCEEDS (full access)"

  reviewer:e2e:
    desc: "End-to-end pipeline test: invoke Lambda → verify data lands in S3 via CDC (~3 min)"
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - bash scripts/verify-e2e-pipeline.sh {{.TF_WORKSPACE | default "prod"}}

  # =========================================================================
  # Local Dev (Kind + ArgoCD + Strimzi)
  # =========================================================================

  dev:check:
    desc: Check local dev tools are installed (kind, tilt, helm, kubectl, kustomize)
    silent: true
    cmds:
      - |
        ok=true
        for tool in kind tilt helm kubectl kustomize docker; do
          if command -v "$tool" > /dev/null 2>&1; then
            printf "  ✓ %-12s %s\n" "$tool" "$(command -v $tool)"
          else
            printf "  ✗ %-12s MISSING\n" "$tool"
            ok=false
          fi
        done
        if [ "$ok" = false ]; then
          echo ""
          echo "Install missing tools:"
          echo "  Kind:      https://kind.sigs.k8s.io/docs/user/quick-start/#installation"
          echo "  Tilt:      https://docs.tilt.dev/install.html"
          echo "  Helm:      https://helm.sh/docs/intro/install/"
          echo "  Kustomize: https://kubectl.docs.kubernetes.io/installation/kustomize/"
          exit 1
        fi
        echo ""
        echo "All dev tools installed."

  dev:up:
    desc: "Spin up local dev environment: Kind cluster + ArgoCD + Strimzi + PostgreSQL + Producer API"
    deps: [dev:check]
    cmds:
      # Phase 1: Terraform creates Kind cluster + ArgoCD + AWS infra (dev workspace)
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform -chdir={{.TF_AWS_DIR}} init -upgrade
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform -chdir={{.TF_AWS_DIR}} workspace select dev
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform -chdir={{.TF_AWS_DIR}} apply -var-file=dev.tfvars -auto-approve

      # Phase 2: Build & load custom Kafka Connect image (Strimzi needs this)
      - |
        echo ""
        echo "Building Kafka Connect image with Iceberg JARs..."
        docker build -t data-lake-connect:with-aws-v8 \
          -f dev/gitops/strimzi/docker/Dockerfile.connect \
          dev/gitops/strimzi/docker/
        echo "Loading image into Kind cluster..."
        kind load docker-image data-lake-connect:with-aws-v8 --name {{.CLUSTER_NAME}}

      # Phase 3: AWS credentials are now managed by KSOPS (secret-generator.yaml
      #   in dev/gitops/strimzi/overlays/localdev/). ArgoCD decrypts the
      #   encrypted secret.enc.yaml and applies it automatically on sync.
      #   Run 'task dev:refresh-creds' to re-encrypt after SSO token refresh.

      # Phase 4: Wait for ArgoCD to reconcile everything
      - |
        echo ""
        echo "Waiting for ArgoCD applications to sync..."
        kubectl -n argocd wait --for=jsonpath='{.status.health.status}'=Healthy \
          applications --all --timeout=300s 2>/dev/null || true

      # Phase 5: Show status + ArgoCD credentials
      - task: dev:status
      - |
        echo ""
        echo "================================================"
        echo "  ArgoCD UI"
        echo "================================================"
        echo "  URL:      http://localhost:8080"
        echo "  Username: admin"
        echo "  Password: datalake-admin"
        echo ""
        echo "Run 'task dev:tilt' for the inner dev loop."

  dev:refresh-creds:
    desc: "Refresh AWS credentials in KSOPS encrypted secret (run after 'aws sso login')"
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1; then
          echo "ERROR: Not logged in to AWS profile '{{.AWS_PROFILE_NAME}}'."
          echo "Run:  task reviewer:login"
          exit 1
        fi
        TMPDIR=$(mktemp -d)
        aws configure export-credentials --profile {{.AWS_PROFILE_NAME}} --format process \
          | python3 -c "
        import json, sys
        c = json.load(sys.stdin)
        print('[default]')
        print(f'aws_access_key_id = {c[\"AccessKeyId\"]}')
        print(f'aws_secret_access_key = {c[\"SecretAccessKey\"]}')
        print(f'aws_session_token = {c[\"SessionToken\"]}')
        " > "${TMPDIR}/credentials"

        SECRET_FILE=dev/gitops/strimzi/overlays/localdev/secret.yaml
        cat > "${SECRET_FILE}" << ENDOFSECRET
        apiVersion: v1
        kind: Secret
        metadata:
          name: aws-credentials
        type: Opaque
        stringData:
          credentials: |
        $(sed 's/^/        /' "${TMPDIR}/credentials")
          config: |
            [default]
            region = {{.SSO_REGION}}
            output = json
        ENDOFSECRET

        cd dev && SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt \
          sops -e gitops/strimzi/overlays/localdev/secret.yaml \
          > gitops/strimzi/overlays/localdev/secret.enc.yaml
        rm -f gitops/strimzi/overlays/localdev/secret.yaml
        rm -rf "${TMPDIR}"
        echo "Encrypted credentials updated in secret.enc.yaml."
        echo "ArgoCD will sync automatically (or run: task dev:argocd-sync)."

  dev:down:
    desc: Tear down local dev environment completely
    cmds:
      - cd dev && tilt down 2>/dev/null || true
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform -chdir={{.TF_AWS_DIR}} workspace select dev 2>/dev/null || true
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform -chdir={{.TF_AWS_DIR}} destroy -var-file=dev.tfvars -auto-approve 2>/dev/null || true
      - kind delete cluster --name {{.CLUSTER_NAME}} 2>/dev/null || true
      - echo "Local dev environment torn down."

  dev:tilt:
    desc: Start Tilt dev loop (Kind cluster must exist)
    dir: dev
    cmds:
      - tilt up

  dev:status:
    desc: Show local dev cluster status (pods, apps, connectors)
    cmds:
      - |
        echo "================================================"
        echo "  Local Dev Environment — Status"
        echo "================================================"
        echo ""
        echo "--- Kind Cluster ---"
        kind get clusters 2>/dev/null | grep {{.CLUSTER_NAME}} || echo "NOT RUNNING"
        echo ""
        echo "--- ArgoCD Applications ---"
        kubectl -n argocd get applications 2>/dev/null || echo "ArgoCD not ready"
        echo ""
        echo "--- Strimzi (Kafka + Connect) ---"
        kubectl -n strimzi get pods 2>/dev/null || echo "Strimzi not ready"
        echo ""
        echo "--- Data Namespace (PostgreSQL + Producer API) ---"
        kubectl -n data get pods 2>/dev/null || echo "Data namespace not ready"
        echo ""
        echo "--- Kafka Connectors ---"
        kubectl -n strimzi get kafkaconnectors 2>/dev/null || echo "No connectors"

  dev:argocd-password:
    desc: Get ArgoCD admin password for local dev
    cmds:
      - |
        echo "ArgoCD UI:  http://localhost:8080"
        echo "Username:   admin"
        echo "Password:   datalake-admin"

  dev:test:
    desc: Run local integration tests (Kind cluster must be running)
    cmds:
      - bash scripts/integration/run-tests.sh

  # =========================================================================
  # AWS Infrastructure
  # =========================================================================

  aws:init:
    desc: Initialize AWS Terraform (workspace-based)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} init -upgrade
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}} 2>/dev/null || terraform -chdir={{.TF_AWS_DIR}} workspace new {{.TF_WORKSPACE | default "dev"}}

  aws:plan:
    desc: Preview AWS infrastructure changes (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} plan -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  aws:apply:
    desc: Apply AWS infrastructure (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} apply -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  aws:destroy:
    desc: Destroy AWS infrastructure (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} destroy -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  # =========================================================================
  # Per-Stack Deployment (State Decomposition)
  # =========================================================================

  deploy:foundation:
    desc: Deploy foundation stack (VPC, subnets, security groups)
    dir: terraform/aws/stacks/foundation
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:data-lake-core:
    desc: Deploy data-lake-core stack (S3, KMS, Glue catalog)
    dir: terraform/aws/stacks/data-lake-core
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:security:
    desc: Deploy security stack (IAM, Lake Formation, observability, bucket policies)
    dir: terraform/aws/stacks/security
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:compute:
    desc: Deploy compute stack (MSK, Aurora)
    dir: terraform/aws/stacks/compute
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:pipelines:
    desc: Deploy pipelines stack (connectors, Lambda, Glue ETL, analytics)
    dir: terraform/aws/stacks/pipelines
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:all:
    desc: Deploy all stacks in dependency order
    cmds:
      # Stacks 1, 2, 3 — no interdependencies (but security needs buckets to exist for DENY policies)
      - task: deploy:foundation
      - task: deploy:data-lake-core
      - task: deploy:security
      # Stack 4 — depends on Stack 1 (VPC/SG IDs)
      - task: deploy:compute
      # Stack 5 — depends on Stacks 1 + 4 (VPC IDs + MSK/Aurora endpoints)
      - task: deploy:pipelines

  # Per-stack destroy tasks (reverse order)
  destroy:all:
    desc: Destroy all stacks in reverse dependency order
    cmds:
      - task: destroy:pipelines
      - task: destroy:compute
      - task: destroy:security
      - task: destroy:data-lake-core
      - task: destroy:foundation

  destroy:pipelines:
    desc: Destroy pipelines stack
    dir: terraform/aws/stacks/pipelines
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:compute:
    desc: Destroy compute stack
    dir: terraform/aws/stacks/compute
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:security:
    desc: Destroy security stack
    dir: terraform/aws/stacks/security
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:data-lake-core:
    desc: Destroy data-lake-core stack
    dir: terraform/aws/stacks/data-lake-core
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:foundation:
    desc: Destroy foundation stack
    dir: terraform/aws/stacks/foundation
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  # =========================================================================
  # Validation
  # =========================================================================

  validate:tf:
    desc: Validate Terraform configuration
    cmds:
      - |
        echo "=== Validating AWS (workspace-based) ==="
        terraform -chdir={{.TF_AWS_DIR}} init -backend=false -input=false > /dev/null 2>&1
        terraform -chdir={{.TF_AWS_DIR}} validate

  # =========================================================================
  # Athena Queries
  # =========================================================================

  athena:query:
    desc: Run an Athena query and wait for results (QUERY="SELECT ...")
    cmds:
      - |
        QID=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena start-query-execution \
          --query-string "{{.QUERY}}" \
          --work-group {{.WORKGROUP | default "data-engineers-dev"}} \
          --query 'QueryExecutionId' --output text)
        echo "Query ID: $QID"
        echo "Waiting..."
        while true; do
          STATE=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
            --query-execution-id "$QID" \
            --query 'QueryExecution.Status.State' --output text)
          if [ "$STATE" = "SUCCEEDED" ]; then
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-results \
              --query-execution-id "$QID" --output table
            break
          elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
              --query-execution-id "$QID" \
              --query 'QueryExecution.Status.StateChangeReason' --output text
            break
          fi
          sleep 2
        done

  athena:demo:
    desc: Run demo queries showing end-to-end data flow
    cmds:
      - |
        echo "=== Raw MNPI Orders (count) ==="
        task athena:query QUERY="SELECT count(*) AS raw_orders FROM raw_mnpi_{{.TF_WORKSPACE | default \"prod\"}}.orders"
        echo ""
        echo "=== Raw Non-MNPI Market Data (count) ==="
        task athena:query QUERY="SELECT count(*) AS raw_ticks FROM raw_nonmnpi_{{.TF_WORKSPACE | default \"prod\"}}.market_data"
        echo ""
        echo "=== Curated Order Events ==="
        task athena:query QUERY="SELECT count(*) AS curated_orders FROM curated_mnpi_{{.TF_WORKSPACE | default \"prod\"}}.order_events"
        echo ""
        echo "=== Analytics: Order Summary by Instrument ==="
        task athena:query QUERY="SELECT instrument_id, total_orders, buy_orders, sell_orders, total_volume FROM analytics_mnpi_{{.TF_WORKSPACE | default \"prod\"}}.order_summary ORDER BY total_orders DESC"
        echo ""
        echo "=== Analytics: Market Summary by Ticker ==="
        task athena:query QUERY="SELECT ticker, tick_count, avg_price, avg_spread, spread_pct FROM analytics_nonmnpi_{{.TF_WORKSPACE | default \"prod\"}}.market_summary ORDER BY tick_count DESC"
