version: '3'

vars:
  CLUSTER_NAME: data-lake
  TF_LOCAL_DIR: terraform/local
  TF_AWS_DIR: terraform/aws

tasks:
  # =========================================================================
  # Lifecycle
  # =========================================================================

  up:
    desc: Start data-lake-platform (Terraform bootstrap + Tilt dev loop)
    cmds:
      - task: infra
      - task: tilt

  down:
    desc: Tear down data-lake-platform completely
    cmds:
      - tilt down || true
      - terraform -chdir={{.TF_LOCAL_DIR}} destroy -auto-approve

  reset:
    desc: Full reset (destroy + recreate)
    cmds:
      - task: down
      - task: up

  # =========================================================================
  # Local Infrastructure (Kind + ArgoCD)
  # =========================================================================

  infra:
    desc: Bootstrap Kind cluster + ArgoCD via Terraform
    cmds:
      - terraform -chdir={{.TF_LOCAL_DIR}} init -upgrade
      - terraform -chdir={{.TF_LOCAL_DIR}} apply -auto-approve

  infra:plan:
    desc: Preview local infrastructure changes
    cmds:
      - terraform -chdir={{.TF_LOCAL_DIR}} init -upgrade
      - terraform -chdir={{.TF_LOCAL_DIR}} plan

  infra:destroy:
    desc: Destroy local infrastructure only
    cmds:
      - terraform -chdir={{.TF_LOCAL_DIR}} destroy -auto-approve

  infra:s3:
    desc: Create S3 bucket for local dev Iceberg data
    cmds:
      - terraform -chdir=terraform/aws/modules/local-dev-storage init
      - terraform -chdir=terraform/aws/modules/local-dev-storage apply -auto-approve

  bootstrap:
    desc: Full bootstrap (infra + wait for ArgoCD sync + integration tests)
    cmds:
      - task: infra
      - |
        echo "Waiting for ArgoCD applications to sync..."
        kubectl -n argocd wait --for=jsonpath='{.status.health.status}'=Healthy \
          applications --all --timeout=300s 2>/dev/null || true
      - task: status
      - task: test:integration

  # =========================================================================
  # AWS Infrastructure
  # =========================================================================

  aws:init:
    desc: Initialize AWS Terraform (workspace-based)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} init -upgrade
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}} 2>/dev/null || terraform -chdir={{.TF_AWS_DIR}} workspace new {{.TF_WORKSPACE | default "dev"}}

  aws:plan:
    desc: Preview AWS infrastructure changes (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} plan -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  aws:apply:
    desc: Apply AWS infrastructure (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} apply -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  aws:destroy:
    desc: Destroy AWS infrastructure (TF_WORKSPACE=dev|prod)
    cmds:
      - terraform -chdir={{.TF_AWS_DIR}} workspace select {{.TF_WORKSPACE | default "dev"}}
      - terraform -chdir={{.TF_AWS_DIR}} destroy -var-file={{.TF_WORKSPACE | default "dev"}}.tfvars

  # =========================================================================
  # Tilt Dev Loop
  # =========================================================================

  tilt:
    desc: Start Tilt dev loop (Kind cluster must exist)
    cmds:
      - tilt up

  tilt:ci:
    desc: Run Tilt in CI mode (non-interactive)
    cmds:
      - tilt ci --timeout 10m

  # =========================================================================
  # ArgoCD
  # =========================================================================

  argocd:password:
    desc: Get ArgoCD admin password
    cmds:
      - |
        kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath='{.data.password}' | base64 -d && echo

  argocd:sync:
    desc: Force refresh all ArgoCD applications
    cmds:
      - |
        for app in $(kubectl -n argocd get applications -o jsonpath='{.items[*].metadata.name}'); do
          echo "Refreshing: $app"
          kubectl -n argocd annotate app "$app" \
            argocd.argoproj.io/refresh=hard --overwrite
        done

  # =========================================================================
  # Status & Debugging
  # =========================================================================

  status:
    desc: Show status of all resources
    cmds:
      - |
        echo "=== Kind Cluster ==="
        kind get clusters 2>/dev/null | grep {{.CLUSTER_NAME}} || echo "NOT RUNNING"
        echo ""
        echo "=== ArgoCD ApplicationSets ==="
        kubectl -n argocd get applicationsets 2>/dev/null || echo "ArgoCD not ready"
        echo ""
        echo "=== ArgoCD Applications ==="
        kubectl -n argocd get applications 2>/dev/null || echo "ArgoCD not ready"
        echo ""
        echo "=== Strimzi Namespace ==="
        kubectl -n strimzi get pods 2>/dev/null || echo "Strimzi not ready"
        echo ""
        echo "=== Data Namespace ==="
        kubectl -n data get pods 2>/dev/null || echo "Data namespace not ready"

  logs:postgres:
    desc: Stream sample-postgres logs
    cmds:
      - kubectl -n data logs -f -l app=sample-postgres

  logs:connect:
    desc: Stream Kafka Connect logs
    cmds:
      - kubectl -n strimzi logs -f -l strimzi.io/kind=KafkaConnect

  # =========================================================================
  # Database
  # =========================================================================

  db:shell:
    desc: Open psql shell to sample trading database
    cmds:
      - |
        kubectl -n data exec -it statefulset/sample-postgres -- \
          psql -U postgres -d trading

  db:seed:
    desc: Seed sample financial data
    cmds:
      - |
        kubectl -n data exec -i statefulset/sample-postgres -- \
          psql -U postgres -d trading < scripts/00_seed/seed-data.sql

  # =========================================================================
  # Testing
  # =========================================================================

  test:unit:
    desc: Run producer-api unit tests with coverage
    dir: producer-api
    cmds:
      - |
        source .venv/bin/activate 2>/dev/null || true
        pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  test:unit:quick:
    desc: Run producer-api unit tests (no coverage)
    dir: producer-api
    cmds:
      - |
        source .venv/bin/activate 2>/dev/null || true
        pytest tests/ -v --tb=short

  alpaca:start:
    desc: Start Alpaca market data adapter (requires ALPACA_API_KEY, ALPACA_SECRET_KEY)
    dir: producer-api
    cmds:
      - |
        source .venv/bin/activate 2>/dev/null || true
        python -m alpaca_adapter

  alpaca:test:
    desc: Run Alpaca transform tests (no API key needed)
    dir: producer-api
    cmds:
      - |
        source .venv/bin/activate 2>/dev/null || true
        pytest tests/test_alpaca_transforms.py -v

  test:integration:
    desc: Run local integration tests (Kind cluster must be running)
    cmds:
      - bash scripts/integration/run-tests.sh

  validate:tf:
    desc: Validate Terraform configurations
    cmds:
      - |
        echo "=== Validating AWS (workspace-based) ==="
        terraform -chdir={{.TF_AWS_DIR}} init -backend=false -input=false > /dev/null 2>&1
        terraform -chdir={{.TF_AWS_DIR}} validate
        echo ""
        echo "=== Validating Local ==="
        terraform -chdir={{.TF_LOCAL_DIR}} init -backend=false -input=false > /dev/null 2>&1
        terraform -chdir={{.TF_LOCAL_DIR}} validate

  # =========================================================================
  # Cleanup
  # =========================================================================

  cleanup:
    desc: Clean up stuck pods
    cmds:
      - kubectl delete pods --field-selector=status.phase=Failed --all-namespaces 2>/dev/null || true
      - echo "Cleanup complete"

  # =========================================================================
  # Athena Demo Queries
  # =========================================================================

  athena:query:
    desc: Run an Athena query and wait for results (QUERY="SELECT ...")
    cmds:
      - |
        QID=$(AWS_PROFILE=data-lake aws athena start-query-execution \
          --query-string "{{.QUERY}}" \
          --work-group {{.WORKGROUP | default "data-engineers-dev"}} \
          --query 'QueryExecutionId' --output text)
        echo "Query ID: $QID"
        echo "Waiting..."
        while true; do
          STATE=$(AWS_PROFILE=data-lake aws athena get-query-execution \
            --query-execution-id "$QID" \
            --query 'QueryExecution.Status.State' --output text)
          if [ "$STATE" = "SUCCEEDED" ]; then
            AWS_PROFILE=data-lake aws athena get-query-results \
              --query-execution-id "$QID" --output table
            break
          elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
            AWS_PROFILE=data-lake aws athena get-query-execution \
              --query-execution-id "$QID" \
              --query 'QueryExecution.Status.StateChangeReason' --output text
            break
          fi
          sleep 2
        done

  athena:demo:
    desc: Run demo queries showing end-to-end data flow
    cmds:
      - |
        echo "=== MNPI Order Events (count) ==="
        task athena:query QUERY="SELECT count(*) AS mnpi_rows FROM raw_mnpi_dev.mnpi_events"
        echo ""
        echo "=== Non-MNPI Market Data (count) ==="
        task athena:query QUERY="SELECT count(*) AS nonmnpi_rows FROM raw_nonmnpi_dev.nonmnpi_events"
        echo ""
        echo "=== MNPI: Event Type Breakdown ==="
        task athena:query QUERY="SELECT event_type, count(*) AS cnt FROM raw_mnpi_dev.mnpi_events GROUP BY event_type ORDER BY cnt DESC"
        echo ""
        echo "=== Non-MNPI: Price Summary by Ticker ==="
        task athena:query QUERY="SELECT ticker, count(*) AS ticks, round(avg(CAST(last_price AS double)),2) AS avg_price FROM raw_nonmnpi_dev.nonmnpi_events GROUP BY ticker ORDER BY ticks DESC"
