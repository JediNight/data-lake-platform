version: '3'

vars:
  CLUSTER_NAME: data-lake
  AWS_PROFILE_NAME: data-lake
  SSO_START_URL: https://mayadangelou.awsapps.com/start
  SSO_REGION: us-east-1
  AWS_ACCOUNT_ID: "445985103066"

tasks:
  # =========================================================================
  # Reviewer Onboarding
  # =========================================================================

  reviewer:check:
    desc: Check that required tools are installed
    silent: true
    cmds:
      - |
        ok=true
        for tool in aws terraform task; do
          if command -v "$tool" > /dev/null 2>&1; then
            printf "  ✓ %-12s %s\n" "$tool" "$(command -v $tool)"
          else
            printf "  ✗ %-12s MISSING\n" "$tool"
            ok=false
          fi
        done
        if [ "$ok" = false ]; then
          echo ""
          echo "Install all tools at once with mise (https://mise.jdx.dev):"
          echo "  mise install"
          echo ""
          echo "Or install individually:"
          echo "  AWS CLI:   https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html"
          echo "  Terraform: https://developer.hashicorp.com/terraform/install"
          echo "  Task:      https://taskfile.dev/installation"
          exit 1
        fi
        echo ""
        echo "All tools installed."

  reviewer:setup:
    desc: "One-command setup: configure SSO profile + login + verify"
    cmds:
      - bash scripts/reviewer-setup.sh

  reviewer:sso:
    desc: Configure AWS SSO profile for reviewer access (use reviewer:setup for all-in-one)
    deps: [reviewer:check]
    cmds:
      - |
        mkdir -p ~/.aws
        if grep -q '\[profile {{.AWS_PROFILE_NAME}}\]' ~/.aws/config 2>/dev/null; then
          echo "Profile '{{.AWS_PROFILE_NAME}}' already exists in ~/.aws/config."
          echo "To reconfigure, remove the existing profile and re-run."
        else
          cat >> ~/.aws/config << EOF

        [profile {{.AWS_PROFILE_NAME}}]
        sso_start_url = {{.SSO_START_URL}}
        sso_region = {{.SSO_REGION}}
        sso_account_id = {{.AWS_ACCOUNT_ID}}
        sso_role_name = Reviewer
        region = {{.SSO_REGION}}
        output = json
        EOF
          echo "Created AWS profile '{{.AWS_PROFILE_NAME}}' in ~/.aws/config"
        fi
        echo ""
        echo "Next: aws sso login --profile {{.AWS_PROFILE_NAME}}"

  reviewer:login:
    desc: Log in to AWS via SSO (opens browser)
    cmds:
      - aws sso login --profile {{.AWS_PROFILE_NAME}}

  reviewer:verify:
    desc: Verify AWS access and show platform status
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Data Lake Platform — Status Check"
        echo "================================================"
        echo ""

        echo "--- Identity ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws sts get-caller-identity --output table
        echo ""

        echo "--- Glue Databases (6 expected) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-databases \
          --query 'DatabaseList[].Name' --output table
        echo ""

        echo "--- MSK Connect Connectors (3 expected: RUNNING) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafkaconnect list-connectors \
          --query 'connectors[].{Name:connectorName,State:connectorState}' --output table
        echo ""

        echo "--- Glue ETL Jobs (4 expected) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-jobs \
          --query 'Jobs[].{Name:Name,Workers:NumberOfWorkers}' --output table
        echo ""

        echo "--- Latest Glue Workflow Run ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue get-workflow-runs \
          --name datalake-medallion-prod --max-results 1 \
          --query 'Runs[0].{Status:Status,Started:StartedOn,Completed:CompletedOn}' --output table
        echo ""

        echo "--- Lambda Trading Simulator ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws lambda get-function \
          --function-name datalake-trading-simulator-prod \
          --query 'Configuration.{Name:FunctionName,Runtime:Runtime,Memory:MemorySize}' --output table
        echo ""

        echo "All checks complete. Run 'task athena:demo' to query data."

  reviewer:sample-queries:
    desc: Run sample Athena queries across all medallion layers
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Row Counts Across All Layers"
        echo "================================================"
        echo ""

        for tbl in "raw_mnpi_prod.orders" "raw_mnpi_prod.trades" "raw_mnpi_prod.positions" \
                    "raw_nonmnpi_prod.market_data" \
                    "curated_mnpi_prod.order_events" "curated_nonmnpi_prod.market_ticks" \
                    "analytics_mnpi_prod.order_summary" "analytics_nonmnpi_prod.market_summary"; do
          QID=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena start-query-execution \
            --query-string "SELECT '$tbl' AS tbl, count(*) AS rows FROM $tbl" \
            --work-group data-engineers-prod \
            --query 'QueryExecutionId' --output text)
          while true; do
            STATE=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
              --query-execution-id "$QID" \
              --query 'QueryExecution.Status.State' --output text)
            if [ "$STATE" = "SUCCEEDED" ]; then
              AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-results \
                --query-execution-id "$QID" \
                --query 'ResultSet.Rows[1].Data[*].VarCharValue' --output text
              break
            elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
              echo "$tbl: QUERY FAILED"
              break
            fi
            sleep 1
          done
        done

  reviewer:access-control-demo:
    desc: Demonstrate Lake Formation access control (MNPI denied for DataAnalyst)
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        echo "================================================"
        echo "  Access Control Demo"
        echo "================================================"
        echo ""
        echo "To test access control, log into the SSO portal with different roles:"
        echo "  {{.SSO_START_URL}}"
        echo ""
        echo "As FinanceAnalyst (finance-analysts-prod workgroup):"
        echo "  SELECT count(*) FROM curated_mnpi_prod.order_events;  -- SUCCEEDS"
        echo "  SELECT count(*) FROM raw_mnpi_prod.orders;            -- DENIED (raw layer)"
        echo ""
        echo "As DataAnalyst (data-analysts-prod workgroup):"
        echo "  SELECT count(*) FROM curated_nonmnpi_prod.market_ticks;  -- SUCCEEDS"
        echo "  SELECT count(*) FROM curated_mnpi_prod.order_events;     -- DENIED (MNPI)"
        echo ""
        echo "As DataEngineer (data-engineers-prod workgroup):"
        echo "  SELECT count(*) FROM raw_mnpi_prod.orders;  -- SUCCEEDS (full access)"

  reviewer:e2e:
    desc: "End-to-end pipeline test: invoke Lambda → verify data lands in S3 via CDC (~3 min)"
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - bash scripts/verify-e2e-pipeline.sh {{.TF_WORKSPACE | default "prod"}}

  # =========================================================================
  # Kafka & KafkaConnect Debugging
  # =========================================================================

  reviewer:kafka-status:
    desc: Show MSK cluster and connector health overview
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        echo "================================================"
        echo "  Kafka & Connector Status (${WS})"
        echo "================================================"
        echo ""

        echo "--- MSK Cluster ---"
        CLUSTER_ARN=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafka list-clusters-v2 \
          --query "ClusterInfoList[?ClusterName==\`datalake-msk-${WS}\`].ClusterArn" --output text)
        if [ -z "$CLUSTER_ARN" ] || [ "$CLUSTER_ARN" = "None" ]; then
          echo "No MSK cluster found for environment: ${WS}"
        else
          AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafka describe-cluster-v2 \
            --cluster-arn "$CLUSTER_ARN" \
            --query 'ClusterInfo.{Name:ClusterName,State:State,Version:Provisioned.CurrentBrokerSoftwareInfo.KafkaVersion,Brokers:Provisioned.NumberOfBrokerNodes}' \
            --output table

          echo ""
          echo "--- Bootstrap Brokers (IAM) ---"
          AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafka get-bootstrap-brokers \
            --cluster-arn "$CLUSTER_ARN" \
            --query 'BootstrapBrokerStringSaslIam' --output text
        fi

        echo ""
        echo "--- MSK Connect Connectors ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafkaconnect list-connectors \
          --query 'connectors[].{Name:connectorName,State:connectorState,Created:creationTime}' \
          --output table

        echo ""
        echo "--- Custom Plugins ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafkaconnect list-custom-plugins \
          --query 'customPlugins[].{Name:name,State:customPluginState}' \
          --output table

  reviewer:connector-logs:
    desc: "Tail MSK Connect logs (CONNECTOR=debezium-source|iceberg-sink-mnpi|iceberg-sink-nonmnpi, FILTER=ERROR)"
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        LOG_GROUP="/msk-connect/datalake-${WS}"
        FILTER="{{.FILTER | default ""}}"
        CONNECTOR="{{.CONNECTOR | default ""}}"
        LINES={{.LINES | default "100"}}

        echo "Log group: ${LOG_GROUP}"

        if [ -n "$FILTER" ]; then
          echo "Filter:    ${FILTER}"
          if [ -n "$CONNECTOR" ]; then
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --log-stream-name-prefix "$CONNECTOR" \
              --filter-pattern "$FILTER" \
              --start-time $(($(date +%s) - 3600))000 \
              --query 'events[].message' --output text | tail -${LINES}
          else
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws logs filter-log-events \
              --log-group-name "$LOG_GROUP" \
              --filter-pattern "$FILTER" \
              --start-time $(($(date +%s) - 3600))000 \
              --query 'events[].message' --output text | tail -${LINES}
          fi
        else
          echo "Tailing last ${LINES} log events..."
          AWS_PROFILE={{.AWS_PROFILE_NAME}} aws logs tail "$LOG_GROUP" --since 1h \
            --format short 2>&1 | tail -${LINES}
        fi

  reviewer:topics:
    desc: List Kafka topics and their partition counts
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        CLUSTER_ARN=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafka list-clusters-v2 \
          --query "ClusterInfoList[?ClusterName==\`datalake-msk-${WS}\`].ClusterArn" --output text 2>/dev/null)
        if [ -z "$CLUSTER_ARN" ] || [ "$CLUSTER_ARN" = "None" ]; then
          echo "No MSK cluster found for environment: ${WS}"
          exit 1
        fi

        echo "================================================"
        echo "  Kafka Topics (${WS})"
        echo "================================================"
        echo ""
        echo "Expected CDC topics:     cdc.trading.{orders,trades,positions,accounts,instruments}"
        echo "Expected stream topics:  stream.market-data"
        echo "Expected control topics: control-iceberg-mnpi, control-iceberg-nonmnpi"
        echo ""

        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws kafka list-topics \
          --cluster-arn "$CLUSTER_ARN" \
          --query 'Topics[].{Topic:TopicName,Partitions:PartitionCount,RF:ReplicationFactor}' \
          --output table

  reviewer:cdc-status:
    desc: Check Aurora CDC health (replication slot, publication, table counts)
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        echo "================================================"
        echo "  Aurora CDC Status (${WS})"
        echo "================================================"
        echo ""

        CLUSTER_ARN=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws rds describe-db-clusters \
          --db-cluster-identifier "datalake-${WS}" \
          --query 'DBClusters[0].DBClusterArn' --output text 2>/dev/null)
        if [ -z "$CLUSTER_ARN" ] || [ "$CLUSTER_ARN" = "None" ]; then
          echo "No Aurora cluster found for environment: ${WS}"
          exit 1
        fi

        SECRET_ARN=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws secretsmanager describe-secret \
          --secret-id "datalake/aurora/${WS}/master-password" \
          --query ARN --output text 2>/dev/null)
        if [ -z "$SECRET_ARN" ] || [ "$SECRET_ARN" = "None" ]; then
          echo "No secret found for Aurora ${WS}. Trying alternate name..."
          SECRET_ARN=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws secretsmanager list-secrets \
            --filter Key=name,Values=datalake \
            --query 'SecretList[0].ARN' --output text)
        fi

        echo "--- Replication Slot (expect: debezium_slot, active=true) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws rds-data execute-statement \
          --resource-arn "$CLUSTER_ARN" --secret-arn "$SECRET_ARN" \
          --database trading \
          --sql "SELECT slot_name, active, pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS wal_lag FROM pg_replication_slots" \
          --output json | python3 -c "
        import json, sys
        r = json.load(sys.stdin)['records']
        if not r:
          print('  No replication slots found')
        else:
          for row in r:
            vals = [list(v.values())[0] for v in row]
            print(f'  slot={vals[0]}  active={vals[1]}  wal_lag={vals[2]}')
        "

        echo ""
        echo "--- Publication (expect: debezium_publication, 5 tables) ---"
        AWS_PROFILE={{.AWS_PROFILE_NAME}} aws rds-data execute-statement \
          --resource-arn "$CLUSTER_ARN" --secret-arn "$SECRET_ARN" \
          --database trading \
          --sql "SELECT schemaname || '.' || tablename AS table_name FROM pg_publication_tables WHERE pubname='debezium_publication' ORDER BY tablename" \
          --output json | python3 -c "
        import json, sys
        r = json.load(sys.stdin)['records']
        if not r:
          print('  No publication tables found')
        else:
          for row in r:
            print(f'  {list(row[0].values())[0]}')
        "

        echo ""
        echo "--- Table Row Counts ---"
        for tbl in orders trades positions accounts instruments; do
          RESULT=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws rds-data execute-statement \
            --resource-arn "$CLUSTER_ARN" --secret-arn "$SECRET_ARN" \
            --database trading \
            --sql "SELECT count(*) FROM public.${tbl}" \
            --output json 2>/dev/null | python3 -c "import json,sys; print(list(json.load(sys.stdin)['records'][0][0].values())[0])" 2>/dev/null || echo "N/A")
          printf "  %-15s %s rows\n" "$tbl" "$RESULT"
        done

  reviewer:s3-freshness:
    desc: Show latest S3 data files per Iceberg table (data freshness check)
    preconditions:
      - sh: aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1
        msg: "Not logged in. Run: task reviewer:login"
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        echo "================================================"
        echo "  S3 Data Freshness (${WS})"
        echo "================================================"
        echo ""
        echo "Showing most recent data file per raw table:"
        echo "(Iceberg sink commits every 2 min when active)"
        echo ""

        for bucket_zone in "mnpi:orders,trades,positions" "nonmnpi:market_data,accounts,instruments"; do
          ZONE="${bucket_zone%%:*}"
          TABLES="${bucket_zone#*:}"
          BUCKET="datalake-${ZONE}-${WS}"
          echo "--- s3://${BUCKET} ---"
          IFS=',' read -ra TBL_ARRAY <<< "$TABLES"
          for tbl in "${TBL_ARRAY[@]}"; do
            LATEST=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws s3 ls "s3://${BUCKET}/raw/${tbl}/data/" \
              --recursive --human-readable 2>/dev/null | tail -1)
            if [ -n "$LATEST" ]; then
              printf "  %-15s %s\n" "$tbl" "$LATEST"
            else
              printf "  %-15s (no data files)\n" "$tbl"
            fi
          done
          echo ""
        done

  # =========================================================================
  # Local Dev (Kind + ArgoCD + Strimzi)
  # =========================================================================

  dev:check:
    desc: Check local dev tools are installed (kind, tilt, helm, kubectl, kustomize)
    silent: true
    cmds:
      - |
        ok=true
        for tool in kind tilt helm kubectl kustomize docker; do
          if command -v "$tool" > /dev/null 2>&1; then
            printf "  ✓ %-12s %s\n" "$tool" "$(command -v $tool)"
          else
            printf "  ✗ %-12s MISSING\n" "$tool"
            ok=false
          fi
        done
        if [ "$ok" = false ]; then
          echo ""
          echo "Install all tools at once with mise (https://mise.jdx.dev):"
          echo "  mise install"
          echo ""
          echo "Or install individually:"
          echo "  Kind:      https://kind.sigs.k8s.io/docs/user/quick-start/#installation"
          echo "  Tilt:      https://docs.tilt.dev/install.html"
          echo "  Helm:      https://helm.sh/docs/intro/install/"
          echo "  Kustomize: https://kubectl.docs.kubernetes.io/installation/kustomize/"
          exit 1
        fi
        echo ""
        echo "All dev tools installed."

  dev:up:
    desc: "Spin up local dev environment: Kind cluster + ArgoCD + Strimzi + PostgreSQL + Producer API"
    deps: [dev:check]
    cmds:
      # Phase 1: Deploy all stacks (creates AWS infra in dev workspace)
      - task: deploy:all

      # Phase 2: Build & load container images into Kind
      #   Must happen BEFORE ArgoCD syncs, otherwise pods get ImagePullBackOff.
      - |
        echo ""
        echo "Building Kafka Connect image with Iceberg JARs..."
        docker build -t data-lake-connect:local \
          -f dev/gitops/strimzi/docker/Dockerfile.connect \
          dev/gitops/strimzi/docker/
        echo "Loading image into Kind cluster..."
        kind load docker-image data-lake-connect:local --name {{.CLUSTER_NAME}}
      - |
        echo ""
        echo "Building Producer API image..."
        docker build -t producer-api:local dev/producer-api/
        echo "Loading image into Kind cluster..."
        kind load docker-image producer-api:local --name {{.CLUSTER_NAME}}

      # Phase 3: AWS credentials are now managed by KSOPS (secret-generator.yaml
      #   in dev/gitops/strimzi/overlays/localdev/). ArgoCD decrypts the
      #   encrypted secret.enc.yaml and applies it automatically on sync.
      #   Run 'task dev:refresh-creds' to re-encrypt after SSO token refresh.

      # Phase 4: Wait for ArgoCD to reconcile everything
      - |
        echo ""
        echo "Waiting for ArgoCD applications to sync..."
        kubectl -n argocd wait --for=jsonpath='{.status.health.status}'=Healthy \
          applications --all --timeout=300s 2>/dev/null || true

      # Phase 5: Show status + ArgoCD credentials
      - task: dev:status
      - |
        echo ""
        echo "================================================"
        echo "  ArgoCD UI"
        echo "================================================"
        echo "  URL:      http://localhost:8080"
        echo "  Username: admin"
        echo "  Password: datalake-admin"
        echo ""
        echo "Run 'task dev:tilt' for the inner dev loop."

  dev:refresh-creds:
    desc: "Refresh AWS credentials in KSOPS encrypted secret (run after 'aws sso login')"
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE_NAME}} > /dev/null 2>&1; then
          echo "ERROR: Not logged in to AWS profile '{{.AWS_PROFILE_NAME}}'."
          echo "Run:  task reviewer:login"
          exit 1
        fi
        TMPDIR=$(mktemp -d)
        aws configure export-credentials --profile {{.AWS_PROFILE_NAME}} --format process \
          | python3 -c "
        import json, sys
        c = json.load(sys.stdin)
        print('[default]')
        print(f'aws_access_key_id = {c[\"AccessKeyId\"]}')
        print(f'aws_secret_access_key = {c[\"SecretAccessKey\"]}')
        print(f'aws_session_token = {c[\"SessionToken\"]}')
        " > "${TMPDIR}/credentials"

        SECRET_FILE=dev/gitops/strimzi/overlays/localdev/secret.yaml
        cat > "${SECRET_FILE}" << ENDOFSECRET
        apiVersion: v1
        kind: Secret
        metadata:
          name: aws-credentials
        type: Opaque
        stringData:
          credentials: |
        $(sed 's/^/        /' "${TMPDIR}/credentials")
          config: |
            [default]
            region = {{.SSO_REGION}}
            output = json
        ENDOFSECRET

        cd dev && SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt \
          sops -e gitops/strimzi/overlays/localdev/secret.yaml \
          > gitops/strimzi/overlays/localdev/secret.enc.yaml
        rm -f gitops/strimzi/overlays/localdev/secret.yaml
        rm -rf "${TMPDIR}"
        echo "Encrypted credentials updated in secret.enc.yaml."
        echo "ArgoCD will sync automatically (or run: task dev:argocd-sync)."

  dev:down:
    desc: Tear down local dev environment completely
    cmds:
      - cd dev && tilt down 2>/dev/null || true
      - task: destroy:all
      - kind delete cluster --name {{.CLUSTER_NAME}} 2>/dev/null || true
      - echo "Local dev environment torn down."

  dev:tilt:
    desc: Start Tilt dev loop (Kind cluster must exist)
    dir: dev
    cmds:
      - tilt up

  dev:status:
    desc: Show local dev cluster status (pods, apps, connectors)
    cmds:
      - |
        echo "================================================"
        echo "  Local Dev Environment — Status"
        echo "================================================"
        echo ""
        echo "--- Kind Cluster ---"
        kind get clusters 2>/dev/null | grep {{.CLUSTER_NAME}} || echo "NOT RUNNING"
        echo ""
        echo "--- ArgoCD Applications ---"
        kubectl -n argocd get applications 2>/dev/null || echo "ArgoCD not ready"
        echo ""
        echo "--- Strimzi (Kafka + Connect) ---"
        kubectl -n strimzi get pods 2>/dev/null || echo "Strimzi not ready"
        echo ""
        echo "--- Data Namespace (PostgreSQL + Producer API) ---"
        kubectl -n data get pods 2>/dev/null || echo "Data namespace not ready"
        echo ""
        echo "--- Kafka Connectors ---"
        kubectl -n strimzi get kafkaconnectors 2>/dev/null || echo "No connectors"

  dev:argocd-password:
    desc: Get ArgoCD admin password for local dev
    cmds:
      - |
        echo "ArgoCD UI:  http://localhost:8080"
        echo "Username:   admin"
        echo "Password:   datalake-admin"

  dev:test:
    desc: Run local integration tests (Kind cluster must be running)
    cmds:
      - bash scripts/integration/run-tests.sh

  # =========================================================================
  # Terraform Stack Operations
  # =========================================================================

  tf:init:
    desc: "Initialize a single stack (STACK=account-baseline|foundation|data-lake-core|security|compute|pipelines)"
    dir: "terraform/aws/stacks/{{.STACK}}"
    requires:
      vars: [STACK]
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade
      # account-baseline uses default workspace (no env isolation needed)
      - |
        if [ "{{.STACK}}" != "account-baseline" ]; then
          terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || terraform workspace new {{.WORKSPACE | default "dev"}}
        fi

  tf:init-all:
    desc: Initialize all Terraform stacks
    cmds:
      - for: [account-baseline, foundation, data-lake-core, security, compute, pipelines]
        task: tf:init
        vars: { STACK: "{{.ITEM}}" }

  tf:plan:
    desc: "Plan a single stack (STACK=account-baseline|foundation|data-lake-core|security|compute|pipelines)"
    dir: "terraform/aws/stacks/{{.STACK}}"
    requires:
      vars: [STACK]
    cmds:
      - |
        if [ "{{.STACK}}" != "account-baseline" ]; then
          AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}}
        fi
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform plan

  tf:plan-all:
    desc: Plan all Terraform stacks in dependency order
    cmds:
      - for: [account-baseline, foundation, data-lake-core, security, compute, pipelines]
        task: tf:plan
        vars: { STACK: "{{.ITEM}}" }

  # =========================================================================
  # Per-Stack Deployment
  # =========================================================================

  deploy:account-baseline:
    desc: Deploy account-baseline stack (Identity Center, LF settings, LF-Tags, QuickSight)
    dir: terraform/aws/stacks/account-baseline
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:foundation:
    desc: Deploy foundation stack (VPC, subnets, security groups)
    dir: terraform/aws/stacks/foundation
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:data-lake-core:
    desc: Deploy data-lake-core stack (S3, KMS, Glue catalog)
    dir: terraform/aws/stacks/data-lake-core
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:security:
    desc: Deploy security stack (IAM, Lake Formation, observability, bucket policies)
    dir: terraform/aws/stacks/security
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:compute:
    desc: Deploy compute stack (MSK, Aurora)
    dir: terraform/aws/stacks/compute
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve

  deploy:pipelines:
    desc: Deploy pipelines stack (connectors, Lambda, Glue ETL, analytics)
    dir: terraform/aws/stacks/pipelines
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform apply -auto-approve
      # Post-deploy: upload connector plugins, init CDC, start Glue (prod only)
      - |
        WORKSPACE="{{.WORKSPACE | default "dev"}}"
        if [ "$WORKSPACE" = "prod" ]; then
          echo ""
          echo "Running post-deploy setup for prod..."
          echo "Uploading MSK Connect connector JARs..."
          ../../scripts/upload-connector-plugins.sh prod
          echo ""
          echo "Initializing Aurora CDC (replication slot + publication + seed tables)..."
          ../../scripts/init-aurora-cdc.sh prod
          echo ""
          echo "Starting Glue medallion workflow..."
          AWS_PROFILE={{.AWS_PROFILE_NAME}} aws glue start-workflow-run --name datalake-medallion-prod --region {{.SSO_REGION}}
          echo "Post-deploy complete."
        fi

  deploy:tier-1:
    desc: "Deploy independent stacks (foundation + data-lake-core) in parallel"
    internal: true
    deps: [deploy:foundation, deploy:data-lake-core]

  deploy:tier-2:
    desc: "Deploy dependent stacks (security + compute) in parallel"
    internal: true
    deps: [deploy:security, deploy:compute]

  deploy:all:
    desc: Deploy all stacks in dependency order (with parallelism)
    cmds:
      - task: deploy:account-baseline
      - task: deploy:tier-1
      - task: deploy:tier-2
      - task: deploy:pipelines

  # Per-stack destroy tasks (reverse order)
  destroy:all:
    desc: Destroy all stacks in reverse dependency order
    cmds:
      - task: destroy:pipelines
      - task: destroy:compute
      - task: destroy:security
      - task: destroy:data-lake-core
      - task: destroy:foundation
      - task: destroy:account-baseline

  destroy:account-baseline:
    desc: Destroy account-baseline stack (Identity Center, LF settings — rarely needed)
    dir: terraform/aws/stacks/account-baseline
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:pipelines:
    desc: Destroy pipelines stack
    dir: terraform/aws/stacks/pipelines
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:compute:
    desc: Destroy compute stack
    dir: terraform/aws/stacks/compute
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:security:
    desc: Destroy security stack
    dir: terraform/aws/stacks/security
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:data-lake-core:
    desc: Destroy data-lake-core stack
    dir: terraform/aws/stacks/data-lake-core
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  destroy:foundation:
    desc: Destroy foundation stack
    dir: terraform/aws/stacks/foundation
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform init -upgrade -input=false
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace select {{.WORKSPACE | default "dev"}} 2>/dev/null || AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform workspace new {{.WORKSPACE | default "dev"}}
      - AWS_PROFILE={{.AWS_PROFILE_NAME}} terraform destroy -auto-approve

  # =========================================================================
  # Validation
  # =========================================================================

  validate:tf:
    desc: Validate all Terraform stack configurations
    cmds:
      - |
        for stack in account-baseline foundation data-lake-core security compute pipelines; do
          echo "=== Validating stack: $stack ==="
          terraform -chdir=terraform/aws/stacks/$stack init -backend=false -input=false > /dev/null 2>&1
          terraform -chdir=terraform/aws/stacks/$stack validate
          echo ""
        done

  # =========================================================================
  # Athena Queries
  # =========================================================================

  athena:query:
    desc: Run an Athena query and wait for results (QUERY="SELECT ...")
    requires:
      vars: [QUERY]
    cmds:
      - |
        QID=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena start-query-execution \
          --query-string "{{.QUERY}}" \
          --work-group {{.WORKGROUP | default "data-engineers-dev"}} \
          --query 'QueryExecutionId' --output text)
        echo "Query ID: $QID"
        echo "Waiting..."
        while true; do
          STATE=$(AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
            --query-execution-id "$QID" \
            --query 'QueryExecution.Status.State' --output text)
          if [ "$STATE" = "SUCCEEDED" ]; then
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-results \
              --query-execution-id "$QID" --output table
            break
          elif [ "$STATE" = "FAILED" ] || [ "$STATE" = "CANCELLED" ]; then
            AWS_PROFILE={{.AWS_PROFILE_NAME}} aws athena get-query-execution \
              --query-execution-id "$QID" \
              --query 'QueryExecution.Status.StateChangeReason' --output text
            break
          fi
          sleep 2
        done

  athena:demo:
    desc: Run demo queries showing end-to-end data flow
    cmds:
      - |
        WS={{.TF_WORKSPACE | default "prod"}}
        WG="data-engineers-${WS}"
        echo "=== Raw MNPI Orders (count) ==="
        task athena:query QUERY="SELECT count(*) AS raw_orders FROM raw_mnpi_${WS}.orders" WORKGROUP="${WG}"
        echo ""
        echo "=== Raw Non-MNPI Market Data (count) ==="
        task athena:query QUERY="SELECT count(*) AS raw_ticks FROM raw_nonmnpi_${WS}.market_data" WORKGROUP="${WG}"
        echo ""
        echo "=== Curated Order Events ==="
        task athena:query QUERY="SELECT count(*) AS curated_orders FROM curated_mnpi_${WS}.order_events" WORKGROUP="${WG}"
        echo ""
        echo "=== Analytics: Order Summary by Instrument ==="
        task athena:query QUERY="SELECT instrument_id, total_orders, buy_orders, sell_orders, total_volume FROM analytics_mnpi_${WS}.order_summary ORDER BY total_orders DESC" WORKGROUP="${WG}"
        echo ""
        echo "=== Analytics: Market Summary by Ticker ==="
        task athena:query QUERY="SELECT ticker, tick_count, avg_price, avg_spread, spread_pct FROM analytics_nonmnpi_${WS}.market_summary ORDER BY tick_count DESC" WORKGROUP="${WG}"
