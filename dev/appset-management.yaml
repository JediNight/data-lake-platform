# Root Application — Application of ApplicationSets
# Mirrors iac-local/appset-management.yaml pattern
#
# Auto-discovers all applicationset.yaml files under gitops/ and syncs to ArgoCD.
# Adding a new service: create gitops/myservice/applicationset.yaml, commit, done.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: appset-management
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: file:///mnt/data-lake-platform
    targetRevision: HEAD
    path: dev/gitops
    directory:
      recurse: true
      include: '*/applicationset.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
