apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: debezium-postgres-source
spec:
  config:
    # Aurora PostgreSQL endpoint — injected via ConfigMap or sealed secret
    database.hostname: "AURORA_ENDPOINT_PLACEHOLDER"
    database.port: "5432"
    database.user: "postgres"
    database.dbname: "trading"
