apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: debezium-postgres-source
spec:
  config:
    database.hostname: "sample-postgres.data.svc.cluster.local"
    database.port: "5432"
    database.user: "postgres"
    database.password: "postgres"

    # Unwrap Debezium CDC envelope on source side so sinks receive flat records.
    # Chained after dropSchemaFromTopic (defined in base).
    transforms: "dropSchemaFromTopic,unwrap"
    transforms.dropSchemaFromTopic.type: "org.apache.kafka.connect.transforms.RegexRouter"
    transforms.dropSchemaFromTopic.regex: "(.+)\\.public\\.(.*)"
    transforms.dropSchemaFromTopic.replacement: "$1.$2"
    transforms.unwrap.type: "io.debezium.transforms.ExtractNewRecordState"
    transforms.unwrap.drop.tombstones: "true"
    transforms.unwrap.delete.handling.mode: "drop"

    # Avro schema validation via AWS Glue Schema Registry
    value.converter: "com.amazonaws.services.schemaregistry.kafkaconnect.AWSKafkaAvroConverter"
    value.converter.region: "us-east-1"
    value.converter.registry.name: "datalake-schemas-dev"
    value.converter.schemaAutoRegistrationEnabled: "true"
    value.converter.avroRecordType: "GENERIC_RECORD"
