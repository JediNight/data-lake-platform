apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: data-lake-connect
spec:
  # Prod uses IRSA for S3 access — no host-mounted credentials needed
  # The service account is annotated with the Kafka Connect IAM role ARN
  template:
    serviceAccount:
      metadata:
        annotations:
          eks.amazonaws.com/role-arn: "KAFKA_CONNECT_ROLE_ARN_PLACEHOLDER"
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
