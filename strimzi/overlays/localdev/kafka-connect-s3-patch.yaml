apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: data-lake-connect
spec:
  bootstrapServers: data-lake-kafka-kafka-bootstrap:9092
  image: index.docker.io/tfawibe/data-lake-connect@sha256:37de0c857ae791804e13853632bf7b088b8214afaae6aaf5bb24ef7eacbd5ef0
  template:
    pod:
      volumes:
        - name: aws-credentials
          secret:
            secretName: aws-credentials
    connectContainer:
      volumeMounts:
        - name: aws-credentials
          mountPath: /mnt/aws
          readOnly: true
      env:
        - name: AWS_SHARED_CREDENTIALS_FILE
          value: /mnt/aws/credentials
        - name: AWS_CONFIG_FILE
          value: /mnt/aws/config
