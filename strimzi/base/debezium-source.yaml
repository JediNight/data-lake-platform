apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: debezium-postgres-source
  labels:
    strimzi.io/cluster: data-lake-connect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  config:
    # Connection (overridden per environment via Kustomize patch)
    database.hostname: "PLACEHOLDER"
    database.port: "5432"
    database.user: "PLACEHOLDER"
    database.password: "PLACEHOLDER"
    database.dbname: "trading"

    # CDC config
    plugin.name: pgoutput
    publication.name: debezium_publication
    topic.prefix: cdc.trading
    slot.name: debezium_slot

    # Snapshot
    snapshot.mode: initial

    # Schema history
    schema.history.internal.kafka.bootstrap.servers: data-lake-kafka-kafka-bootstrap:9092
    schema.history.internal.kafka.topic: debezium-schema-history

    # Tables to capture (all 5)
    table.include.list: "public.orders,public.trades,public.positions,public.accounts,public.instruments"

    # Strip schema name from topic: cdc.trading.public.orders -> cdc.trading.orders
    transforms: dropSchemaFromTopic
    transforms.dropSchemaFromTopic.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.dropSchemaFromTopic.regex: "(.+)\\.public\\.(.*)"
    transforms.dropSchemaFromTopic.replacement: "$1.$2"
