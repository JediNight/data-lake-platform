apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: strimzi
resources:
  - ../../base
  - kafka-cluster.yaml
patches:
  - path: debezium-source-patch.yaml
    target:
      kind: KafkaConnector
      name: debezium-postgres-source
  - path: iceberg-sink-mnpi-patch.yaml
    target:
      kind: KafkaConnector
      name: iceberg-sink-mnpi
  - path: iceberg-sink-nonmnpi-patch.yaml
    target:
      kind: KafkaConnector
      name: iceberg-sink-nonmnpi
  - path: kafka-connect-patch.yaml
    target:
      kind: KafkaConnect
      name: data-lake-connect
